<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>JobPortal Pro | Find Your Future Career</title>
  <!-- Google Fonts + Font Awesome CDN -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f0f4fc 0%, #e6edf7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* main app container */
    .app-container {
      max-width: 1300px;
      width: 100%;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(2px);
      border-radius: 3rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
      overflow: hidden;
      transition: all 0.2s;
    }

    /* card style for forms / dashboard */
    .glass-panel {
      background: rgba(255,255,255,0.96);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
      padding: 2rem 2rem;
      backdrop-filter: blur(0px);
      transition: transform 0.2s ease;
    }

    /* header & branding */
    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .brand h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e2b6e, #2a4b9e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .brand p {
      color: #4a5b7a;
      font-weight: 500;
      margin-top: 0.3rem;
    }

    /* form groups */
    .input-group {
      margin-bottom: 1.3rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .input-group label {
      font-weight: 600;
      color: #1e2f4e;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
    }
    .input-group i {
      width: 1.6rem;
      color: #2a6f9c;
    }
    .input-field {
      display: flex;
      align-items: center;
      background: #f8fafd;
      border: 1px solid #dfe7f0;
      border-radius: 1.2rem;
      padding: 0.6rem 1rem;
      transition: all 0.2s;
    }
    .input-field:focus-within {
      border-color: #2a6f9c;
      box-shadow: 0 0 0 3px rgba(42,111,156,0.2);
      background: white;
    }
    .input-field input, .input-field select {
      border: none;
      background: transparent;
      width: 100%;
      font-size: 0.95rem;
      font-weight: 500;
      outline: none;
      padding: 0.2rem 0;
    }
    .input-field select {
      cursor: pointer;
    }
    .btn {
      background: #1f3e6e;
      border: none;
      padding: 0.85rem 1.8rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 0.95rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      box-shadow: 0 5px 12px rgba(0,0,0,0.08);
    }
    .btn-primary {
      background: linear-gradient(95deg, #1f3e6e, #2a5f9e);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -8px #1f3e6e60;
      background: linear-gradient(95deg, #163458, #1f4e82);
    }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #1f3e6e;
      color: #1f3e6e;
      box-shadow: none;
    }
    .btn-outline:hover {
      background: #eef3fc;
      transform: translateY(-1px);
    }
    .toggle-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #4a627a;
    }
    .toggle-link span {
      color: #1f3e6e;
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline;
    }
    .error-msg {
      color: #d9534f;
      font-size: 0.75rem;
      margin-top: 0.2rem;
      font-weight: 500;
    }
    .success-toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #2c6e2c;
      color: white;
      padding: 12px 22px;
      border-radius: 40px;
      font-weight: 600;
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
      z-index: 1000;
      transition: 0.2s;
      animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
    /* Dashboard grid */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid #e2ecfa;
    }
    .welcome-text h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0f2a44;
    }
    .job-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .job-card {
      background: white;
      border-radius: 1.5rem;
      padding: 1.4rem;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05);
      transition: all 0.2s;
      border: 1px solid #eef3fc;
    }
    .job-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -12px rgba(0,0,0,0.12);
    }
    .job-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1f3e6e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .company {
      color: #2a6f9c;
      font-weight: 600;
      margin: 8px 0 6px;
    }
    .job-desc {
      color: #4c5a6b;
      font-size: 0.8rem;
      margin: 10px 0;
      line-height: 1.4;
    }
    .salary {
      font-weight: 700;
      color: #218838;
      background: #e6f4ea;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
    }
    .logout-icon {
      background: #f0f4fa;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .logout-icon i {
      margin-right: 6px;
    }
    .logout-icon:hover {
      background: #ffe0db;
      color: #b33;
    }
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #5b6e8c;
    }
    @media (max-width: 650px) {
      .glass-panel { padding: 1.5rem; }
      .brand h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
<div class="app-container" id="appRoot">
  <!-- Dynamic views will be injected here -->
</div>

<script>
  // ---------- STORAGE KEYS ----------
  const USERS_KEY = "jobportal_users";
  const CURRENT_USER_KEY = "jobportal_currentUser";

  // ---------- MOCK JOBS DATABASE (company jobs) ----------
  const JOBS_DB = [
    { id: 1, title: "Frontend Developer", company: "TechSolutions Inc.", location: "Remote", salary: "$65k - $85k", description: "Build modern interfaces with React & Vue. Creative team." },
    { id: 2, title: "Backend Engineer", company: "DataCore Systems", location: "Hybrid (Manila)", salary: "$70k - $95k", description: "Node.js, Python, database optimization." },
    { id: 3, title: "Full Stack Developer", company: "InnovateLabs", location: "Onsite - BGC", salary: "$80k - $105k", description: "Work with MERN stack and cloud services." },
    { id: 4, title: "UI/UX Designer", company: "Creative Pixel", location: "Remote", salary: "$60k - $78k", description: "Figma, user research, design systems." },
    { id: 5, title: "DevOps Engineer", company: "CloudScale", location: "Hybrid", salary: "$85k - $115k", description: "AWS, Kubernetes, CI/CD pipelines." },
    { id: 6, title: "Product Manager", company: "NextGen Startup", location: "Manila", salary: "$90k - $120k", description: "Agile roadmap, stakeholder management." }
  ];

  // Helper functions
  function getUsers() {
    const stored = localStorage.getItem(USERS_KEY);
    return stored ? JSON.parse(stored) : [];
  }

  function saveUsers(users) {
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
  }

  function getCurrentUser() {
    const curr = localStorage.getItem(CURRENT_USER_KEY);
    return curr ? JSON.parse(curr) : null;
  }

  function setCurrentUser(user) {
    if (user) {
      localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
    } else {
      localStorage.removeItem(CURRENT_USER_KEY);
    }
  }

  // Show toast message
  function showToast(message, isError = false) {
    let toastContainer = document.getElementById("toastContainer");
    if (!toastContainer) {
      toastContainer = document.createElement("div");
      toastContainer.id = "toastContainer";
      document.body.appendChild(toastContainer);
    }
    const toast = document.createElement("div");
    toast.className = "success-toast";
    toast.style.background = isError ? "#b33" : "#2c6e2c";
    toast.innerText = message;
    toastContainer.appendChild(toast);
    setTimeout(() => {
      toast.remove();
    }, 2800);
  }

  // Register logic
  function handleRegister(username, email, password, role) {
    const users = getUsers();
    // Check if email already exists
    if (users.some(u => u.email === email)) {
      showToast("Email already registered! Try logging in.", true);
      return false;
    }
    if (!username.trim() || !email.trim() || !password.trim()) {
      showToast("All fields are required!", true);
      return false;
    }
    if (password.length < 4) {
      showToast("Password must be at least 4 characters", true);
      return false;
    }
    const newUser = {
      id: Date.now(),
      username: username.trim(),
      email: email.trim(),
      password: password,   // plain for demo (real apps would hash)
      role: role || "jobseeker",
      joined: new Date().toISOString()
    };
    users.push(newUser);
    saveUsers(users);
    showToast("Registration successful! Please login.");
    return true;
  }

  // Login logic
  function handleLogin(email, password) {
    const users = getUsers();
    const found = users.find(u => u.email === email && u.password === password);
    if (found) {
      setCurrentUser({ id: found.id, username: found.username, email: found.email, role: found.role });
      showToast(`Welcome back, ${found.username}!`);
      return true;
    } else {
      showToast("Invalid email or password", true);
      return false;
    }
  }

  function logout() {
    setCurrentUser(null);
    showToast("Logged out successfully");
    renderApp();
  }

  // Dashboard component: shows jobs listing from the company
  function renderDashboard(user) {
    return `
      <div class="glass-panel">
        <div class="dashboard-header">
          <div class="welcome-text">
            <h2><i class="fas fa-briefcase"></i> Job Portal</h2>
            <p>Hello, ${escapeHtml(user.username)}! Explore our latest career opportunities</p>
          </div>
          <div class="logout-icon" id="logoutBtnDashboard">
            <i class="fas fa-sign-out-alt"></i> Logout
          </div>
        </div>
        <div style="margin-bottom: 1rem;">
          <span style="background:#e9eff7; padding:5px 14px; border-radius: 30px; font-size:0.8rem;"><i class="fas fa-building"></i> Partner Companies: TechSolutions, DataCore, InnovateLabs & more</span>
        </div>
        <div class="job-grid">
          ${JOBS_DB.map(job => `
            <div class="job-card">
              <div class="job-title">
                <i class="fas fa-code"></i> ${escapeHtml(job.title)}
              </div>
              <div class="company"><i class="fas fa-building"></i> ${escapeHtml(job.company)}</div>
              <div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location)}</div>
              <div class="job-desc">${escapeHtml(job.description)}</div>
              <div style="display:flex; justify-content: space-between; align-items:center; margin-top: 12px;">
                <span class="salary"><i class="fas fa-dollar-sign"></i> ${escapeHtml(job.salary)}</span>
                <button class="apply-job-btn" data-jobid="${job.id}" style="background:#1f3e6e; border:none; color:white; border-radius:40px; padding:6px 14px; cursor:pointer; font-weight:500;"><i class="fas fa-paper-plane"></i> Apply</button>
              </div>
            </div>
          `).join('')}
        </div>
        <footer>
          <i class="fas fa-shield-alt"></i> Secure platform | © 2025 JobPortal Pro – your career starts here
        </footer>
      </div>
    `;
  }

  // Registration Form (default first view: register) but we provide both
  function renderRegisterForm() {
    return `
      <div class="glass-panel">
        <div class="brand">
          <h1><i class="fas fa-user-plus"></i> Create Account</h1>
          <p>Join JobPortal Pro & discover amazing jobs</p>
        </div>
        <form id="registerForm">
          <div class="input-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <div class="input-field">
              <input type="text" id="regUsername" placeholder="e.g., Maria Santos" required>
            </div>
          </div>
          <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <div class="input-field">
              <input type="email" id="regEmail" placeholder="hello@example.com" required>
            </div>
          </div>
          <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <div class="input-field">
              <input type="password" id="regPassword" placeholder="Min. 4 characters" required>
            </div>
          </div>
          <div class="input-group">
            <label><i class="fas fa-briefcase"></i> I'm applying as</label>
            <div class="input-field">
              <select id="regRole">
                <option value="jobseeker">Job Seeker</option>
                <option value="professional">Experienced Professional</option>
                <option value="student">Fresh Graduate / Student</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-user-check"></i> Register now</button>
          <div class="toggle-link">
            Already have an account? <span id="gotoLoginBtn">Sign in here →</span>
          </div>
        </form>
      </div>
    `;
  }

  // Login Form
  function renderLoginForm() {
    return `
      <div class="glass-panel">
        <div class="brand">
          <h1><i class="fas fa-sign-in-alt"></i> Welcome Back</h1>
          <p>Login to access job listings & apply instantly</p>
        </div>
        <form id="loginForm">
          <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <div class="input-field">
              <input type="email" id="loginEmail" placeholder="your@email.com" required>
            </div>
          </div>
          <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <div class="input-field">
              <input type="password" id="loginPassword" placeholder="••••••" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-arrow-right-to-bracket"></i> Login</button>
          <div class="toggle-link">
            Don't have an account? <span id="gotoRegisterBtn">Create one for free →</span>
          </div>
        </form>
        <footer style="margin-top: 1.5rem;">
          <i class="fas fa-laptop-code"></i> Demo: Register first, then explore jobs
        </footer>
      </div>
    `;
  }

  // Helper to escape HTML
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // main render function: decide which view (register/login or dashboard)
  function renderApp() {
    const appRoot = document.getElementById("appRoot");
    const currentUser = getCurrentUser();

    if (currentUser) {
      // Show dashboard with jobs
      appRoot.innerHTML = renderDashboard(currentUser);
      // attach logout event
      const logoutBtn = document.getElementById("logoutBtnDashboard");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", (e) => {
          e.preventDefault();
          logout();
        });
      }
      // attach apply buttons for demo interaction
      const applyBtns = document.querySelectorAll(".apply-job-btn");
      applyBtns.forEach(btn => {
        btn.addEventListener("click", (e) => {
          const jobId = btn.getAttribute("data-jobid");
          const job = JOBS_DB.find(j => j.id == jobId);
          if (job) {
            showToast(`✨ Application sent for "${job.title}" at ${job.company}. HR will contact you soon!`);
          } else {
            showToast("Job not found", true);
          }
        });
      });
    } else {
      // By default we show REGISTER first (as requested: "mauuna register html")
      // But we also allow switching between login and register
      appRoot.innerHTML = renderRegisterForm();
      attachRegisterEvents();
      const gotoLogin = document.getElementById("gotoLoginBtn");
      if (gotoLogin) {
        gotoLogin.addEventListener("click", () => {
          appRoot.innerHTML = renderLoginForm();
          attachLoginEvents();
          const gotoReg = document.getElementById("gotoRegisterBtn");
          if (gotoReg) {
            gotoReg.addEventListener("click", () => {
              appRoot.innerHTML = renderRegisterForm();
              attachRegisterEvents();
            });
          }
        });
      }
    }
  }

  function attachRegisterEvents() {
    const regForm = document.getElementById("registerForm");
    if (regForm) {
      regForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const username = document.getElementById("regUsername").value;
        const email = document.getElementById("regEmail").value;
        const password = document.getElementById("regPassword").value;
        const role = document.getElementById("regRole").value;
        const success = handleRegister(username, email, password, role);
        if (success) {
          // after register, switch to login form automatically
          const appRoot = document.getElementById("appRoot");
          appRoot.innerHTML = renderLoginForm();
          attachLoginEvents();
          const gotoRegAgain = document.getElementById("gotoRegisterBtn");
          if (gotoRegAgain) {
            gotoRegAgain.addEventListener("click", () => {
              appRoot.innerHTML = renderRegisterForm();
              attachRegisterEvents();
            });
          }
        }
      });
    }
  }

  function attachLoginEvents() {
    const loginForm = document.getElementById("loginForm");
    if (loginForm) {
      loginForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const logged = handleLogin(email, password);
        if (logged) {
          renderApp();  // refresh to dashboard
        }
      });
    }
  }

  // initial load, also check any session
  window.addEventListener("DOMContentLoaded", () => {
    renderApp();
  });
</script>
</body>
</html>
